<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PTE Practice</title>
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('pte-auth') || '{}')
        if (s.state && s.state.user && s.state.user.ui_preferences && s.state.user.ui_preferences.dark_mode) {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
