services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: pte_app
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - pte_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - PHP_OPCACHE_ENABLE=0

  nginx:
    image: nginx:alpine
    container_name: pte_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - pte_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: pte_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: pte_practice
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_USER: pte_user
      MYSQL_PASSWORD: pte_secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - pte_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pte_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - pte_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: pte_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - pte_network

volumes:
  mysql_data:
  redis_data:

networks:
  pte_network:
    driver: bridge
